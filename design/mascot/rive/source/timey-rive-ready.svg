    <path d="M78.4 43.5C78.4 45.5 76.8 47.1 74.8 47.1C72.8 47.1 71.2 45.5 71.2 43.5C71.2 41.1 73.1 38.8 74.8 37C76.5 38.8 78.4 41.1 78.4 43.5Z" fill="#8ED1FF"/>
  </g>

