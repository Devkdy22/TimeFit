    <g id="bodyWarning" opacity="0"><circle cx="60" cy="54" r="34" fill="url(#bodyAmber)"/></g>
    <g id="bodyUrgent" opacity="0"><circle cx="60" cy="54" r="34" fill="url(#bodyUrgent)"/></g>
    <g id="bodyLate" opacity="0"><circle cx="60" cy="54" r="34" fill="url(#bodyLate)"/></g>

    <circle cx="60" cy="54" r="33.5" fill="url(#ringRimLight)"/>
    <ellipse cx="60" cy="71" rx="23.5" ry="9.8" fill="url(#ringBottomShade)"/>
    <ellipse cx="48" cy="36" rx="15.8" ry="9.5" fill="url(#ringSpecMain)"/>
    <ellipse cx="73" cy="66.5" rx="13.5" ry="7.6" fill="url(#ringSpecSub)"/>
    <ellipse cx="39.7" cy="60.7" rx="2.8" ry="1.7" fill="#14303A" fill-opacity="0.12"/>
    <ellipse cx="80.3" cy="60.7" rx="2.8" ry="1.7" fill="#14303A" fill-opacity="0.12"/>
