    <ellipse cx="82.7" cy="59.8" rx="1.8" ry="1.2" fill="#FFFFFF" fill-opacity="0.22"/>
    <ellipse cx="84.1" cy="62.2" rx="1.9" ry="1.2" fill="#16333D" fill-opacity="0.12"/>
  </g>

  <g id="body">
