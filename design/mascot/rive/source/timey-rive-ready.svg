<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Body palettes by state -->
    <linearGradient id="bodyMint" x1="31" y1="23" x2="89" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8EDFD7"/>
      <stop offset="0.55" stop-color="#6DCFC6"/>
      <stop offset="1" stop-color="#58BEB6"/>
    </linearGradient>
    <linearGradient id="bodyAmber" x1="31" y1="23" x2="89" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD183"/>
      <stop offset="0.55" stop-color="#F8AF3F"/>
      <stop offset="1" stop-color="#E5901F"/>
    </linearGradient>
    <linearGradient id="bodyUrgent" x1="31" y1="23" x2="89" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8681"/>
      <stop offset="0.55" stop-color="#F2554C"/>
      <stop offset="1" stop-color="#DE3A32"/>
    </linearGradient>
    <linearGradient id="bodyLate" x1="31" y1="23" x2="89" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EB7B73"/>
      <stop offset="0.55" stop-color="#D95D55"/>
      <stop offset="1" stop-color="#BD433C"/>
    </linearGradient>

    <!-- Clay material layers -->
    <radialGradient id="ringSpecMain" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(48 36) rotate(30) scale(19 12)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ringSpecSub" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(73 67) rotate(16) scale(15 8)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
