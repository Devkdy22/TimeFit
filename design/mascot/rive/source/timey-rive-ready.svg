    <path d="M79.6 34.7C79.6 31.4 77 29 73.7 29C70.8 29 68.4 30.9 67.9 33.6H70.6C70.9 32.4 71.9 31.8 73.2 31.8C74.6 31.8 75.6 32.8 75.6 34C75.6 35.2 74.7 35.8 73.5 36.4C71.5 37.3 70.4 38.5 70.4 40.4V40.9H73.8V40.6C73.8 39.6 74.3 39 75.5 38.5C77.7 37.4 79.6 36.2 79.6 34.7ZM73.5 44.8C74.6 44.8 75.6 43.9 75.6 42.7C75.6 41.5 74.6 40.6 73.5 40.6C72.3 40.6 71.4 41.5 71.4 42.7C71.4 43.9 72.3 44.8 73.5 44.8Z" fill="#58C7C2"/>
  </g>

  <g id="alertIcon" opacity="0">
    <circle cx="80.3" cy="36.1" r="4.8" fill="#EF4444"/>
    <rect x="79.6" y="33.2" width="1.4" height="3.8" rx="0.7" fill="#FFFFFF"/>
    <circle cx="80.3" cy="38.4" r="0.7" fill="#FFFFFF"/>
  </g>

  <g id="confetti" opacity="0">
    <rect x="43" y="30" width="1.7" height="4.8" rx="0.85" transform="rotate(-24 43 30)" fill="#58C7C2"/>
    <rect x="49" y="26.2" width="1.7" height="4.8" rx="0.85" transform="rotate(22 49 26.2)" fill="#F59E0B"/>
    <rect x="69" y="26.2" width="1.7" height="4.8" rx="0.85" transform="rotate(-16 69 26.2)" fill="#EF4444"/>
    <rect x="75" y="30" width="1.7" height="4.8" rx="0.85" transform="rotate(18 75 30)" fill="#2BB673"/>
  </g>
</svg>
