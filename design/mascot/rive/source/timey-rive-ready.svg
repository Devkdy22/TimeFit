  </g>
  <g id="mouthWarning" opacity="0">
    <path d="M56.2 63.3C57.1 62.1 58.4 61.5 60 61.5C61.6 61.5 62.9 62.1 63.8 63.3" stroke="#1F2A44" stroke-width="1.7" stroke-linecap="round"/>
  </g>
  <g id="mouthUrgent" opacity="0">
    <ellipse cx="60" cy="62.7" rx="2.1" ry="2.4" fill="#A42D24"/>
  </g>
  <g id="mouthOffroute" opacity="0">
    <path d="M56 63.6C57.3 61.9 58.8 61.1 60 61.1C61.2 61.1 62.7 61.9 64 63.6" stroke="#1F2A44" stroke-width="1.7" stroke-linecap="round"/>
  </g>
  <g id="mouthSurprised" opacity="0">
