    <radialGradient id="ringBottomShade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(60 73) rotate(-90) scale(13 24)">
      <stop offset="0" stop-color="#15333E" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#15333E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringRimLight" x1="35" y1="25" x2="87" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Face inset -->
    <linearGradient id="faceCream" x1="41" y1="30" x2="79" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF9EF"/>
      <stop offset="1" stop-color="#F8F0E3"/>
    </linearGradient>
    <radialGradient id="faceInsetAO" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(60 64) rotate(-90) scale(16 24)">
      <stop offset="0" stop-color="#17242C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#17242C" stop-opacity="0"/>
    </radialGradient>

    <!-- Limbs -->
    <linearGradient id="limbMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#95E1DA"/>
      <stop offset="1" stop-color="#5CBBB4"/>
    </linearGradient>

    <!-- Top button -->
    <linearGradient id="btnBase" x1="52.3" y1="11.2" x2="67.7" y2="15.6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A2E5DE"/>
      <stop offset="0.5" stop-color="#71CFC7"/>
      <stop offset="1" stop-color="#58BEB6"/>
    </linearGradient>

    <!-- Eyes -->
