    <path d="M58.8 14.8H61.2" stroke="#F0FFFD" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="60" cy="17.8" rx="3.1" ry="0.8" fill="#123640" fill-opacity="0.18"/>
  </g>

